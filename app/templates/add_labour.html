{% extends "base.html" %}

{% block content %}

<div class="page-header">
    <h1 class="page-title">Add Labour</h1>
</div>

<div class="card">

    <div class="card-body">

    <form method="POST">

        <div class="mb-3">
            <label class="mb-2">Name</label>
            <input type="text" name="name" class="form-control" required>
        </div>

        <div class="mb-3">
            <label class="mb-2">Specialization</label>
            <input type="text" name="specialization" class="form-control">
        </div>

        <div class="mb-4">
            <label class="mb-2">Hourly Rate (BD)</label>
            <input type="number" step="0.01" name="hourly_rate"
                   class="form-control" required>
        </div>

        <button class="btn btn-primary" style="height:48px;padding:0 32px;">
            Save Labour
        </button>

    </form>

    </div>

</div>

{% endblock %}
