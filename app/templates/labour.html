{% extends "base.html" %}

{% block content %}

<div class="page-header">
    <h1 class="page-title">Labour</h1>
    <a href="/add_labour" class="btn btn-primary">Add Labour</a>
</div>

<div class="card">

    <div class="table-responsive">

        <table class="table table-dark table-hover">

            <thead>
                <tr>
                    <th>ID</th>
                    <th>Name</th>
                    <th>Specialization</th>
                    <th>Rate/hr</th>
                    <th>Actions</th>
                </tr>
            </thead>

            <tbody>

                {% for worker in labour %}

                <tr>
                    <td>{{ worker.id }}</td>
                    <td><strong>{{ worker.name }}</strong></td>
                    <td>{{ worker.specialization or '-' }}</td>
                    <td>BD {{ "%.2f"|format(worker.hourly_rate) }}</td>
                    <td>
                        <div style="display:flex;gap:8px;flex-wrap:wrap;">
                            <a href="/edit_labour/{{ worker.id }}"
                               class="btn btn-warning btn-sm">
                                Edit
                            </a>
                            <a href="/delete_labour/{{ worker.id }}"
                               class="btn btn-danger btn-sm"
                               onclick="return confirm('Delete this worker?')">
                                Delete
                            </a>
                        </div>
                    </td>
                </tr>

                {% endfor %}

            </tbody>

        </table>

    </div>

</div>

{% endblock %}
