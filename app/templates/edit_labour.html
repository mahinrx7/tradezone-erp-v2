{% extends "base.html" %}

{% block content %}

<h1 class="mb-4">

Edit Labour

</h1>

<div class="card p-4">

<form method="POST">

<div class="mb-3">

<input type="text"
       name="name"
       value="{{ worker.name }}"
       class="form-control">

</div>

<div class="mb-3">

<input type="text"
       name="specialization"
       value="{{ worker.specialization }}"
       class="form-control">

</div>

<div class="mb-4">

<input type="number"
       step="0.01"
       name="hourly_rate"
       value="{{ worker.hourly_rate }}"
       class="form-control">

</div>

<button class="btn btn-primary">

Update Labour

</button>

</form>

</div>

{% endblock %}
