{% extends "base.html" %}

{% block content %}

<div class="page-header">

    <h1>Edit Expense</h1>

</div>

<div class="card">

    <form method="POST">

        <div class="form-grid">

            <div>

                <label class="form-label">
                    Site
                </label>

                <select
                    name="site_id"
                    class="form-input"
                    required
                >

                    {% for site in sites %}

                    <option
                        value="{{ site.id }}"
                        {% if site.id == expense.site_id %}
                        selected
                        {% endif %}
                    >

                        {{ site.name }}

                    </option>

                    {% endfor %}

                </select>

            </div>

            <div>

                <label class="form-label">
                    Category
                </label>

                <input
                    type="text"
                    name="category"
                    class="form-input"
                    value="{{ expense.category }}"
                    required
                >

            </div>

            <div>

                <label class="form-label">
                    Description
                </label>

                <input
                    type="text"
                    name="description"
                    class="form-input"
                    value="{{ expense.description }}"
                    required
                >

            </div>

            <div>

                <label class="form-label">
                    Amount
                </label>

                <input
                    type="number"
                    step="0.001"
                    name="amount"
                    class="form-input"
                    value="{{ expense.amount }}"
                    required
                >

            </div>

            <div>

                <label class="form-label">
                    Date
                </label>

                <input
                    type="date"
                    name="date"
                    class="form-input"
                    value="{{ expense.date if expense.date else '' }}"
                    required
                >

            </div>

        </div>

        <button
            type="submit"
            class="btn-primary"
            style="margin-top: 20px;"
        >

            Update Expense

        </button>

    </form>

</div>

{% endblock %}
