{% extends "base.html" %}

{% block content %}

<h1 class="mb-4">

Add Expense

</h1>


<div class="card p-4">

<form method="POST"
      enctype="multipart/form-data">

<div class="row g-3">


<div class="col-lg-4">

<label class="mb-2">

Site

</label>

<select name="site_id"
        class="form-control"
        required>

{% for site in sites %}

<option value="{{ site.id }}">

{{ site.name }}

</option>

{% endfor %}

</select>

</div>



<div class="col-lg-4">

<label class="mb-2">

Category

</label>

<select name="category"
        class="form-control"
        required>

<option>Fuel</option>
<option>Material</option>
<option>Labour</option>
<option>Transport</option>
<option>Vehicle Rent</option>
<option>Equipment</option>
<option>Maintenance</option>
<option>Food</option>
<option>Accommodation</option>
<option>Electrical</option>
<option>Plumbing</option>
<option>Tools</option>
<option>Other</option>

</select>

</div>



<div class="col-lg-4">

<label class="mb-2">

Amount

</label>

<input type="number"
       step="0.01"
       name="amount"
       class="form-control"
       required>

</div>



<div class="col-lg-6">

<label class="mb-2">

Description

</label>

<input type="text"
       name="description"
       class="form-control">

</div>



<div class="col-lg-3">

<label class="mb-2">

Date

</label>

<input type="date"
       name="date"
       class="form-control"
       required>

</div>



<div class="col-lg-3">

<label class="mb-2">

Receipt Image

</label>

<input type="file"
       name="receipt"
       class="form-control">

</div>



<div class="col-lg-12 mt-4">

<button class="btn btn-primary">

Save Expense

</button>

</div>

</div>

</form>

</div>

{% endblock %}
