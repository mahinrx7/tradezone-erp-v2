{% extends "base.html" %}

{% block content %}

<h1 class="mb-4">

Edit Site

</h1>

<div class="card p-4">

<form method="POST">

    <div class="mb-3">

        <label class="mb-2">

            Site Name

        </label>

        <input type="text"
               name="name"
               value="{{ site.name }}"
               class="form-control"
               required>

    </div>

    <div class="mb-3">

        <label class="mb-2">

            Client Name

        </label>

        <input type="text"
               name="client_name"
               value="{{ site.client_name }}"
               class="form-control">

    </div>

    <div class="mb-4">

        <label class="mb-2">

            Contract Amount

        </label>

        <input type="number"
               step="0.01"
               name="contract_amount"
               value="{{ site.contract_amount }}"
               class="form-control">

    </div>

    <button class="btn btn-primary">

        Update Site

    </button>

</form>

</div>

{% endblock %}
