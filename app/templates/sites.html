{% extends "base.html" %}

{% block content %}

<div class="page-header">
    <h1 class="page-title">Sites</h1>
    <a href="/add_site" class="btn btn-primary">Add Site</a>
</div>

<div class="card">

    <div class="table-responsive">

        <table class="table table-dark table-hover align-middle">

            <thead>
                <tr>
                    <th>ID</th>
                    <th>Site</th>
                    <th>Client</th>
                    <th>Contract</th>
                    <th>Actions</th>
                </tr>
            </thead>

            <tbody>

                {% for site in sites %}

                <tr>
                    <td>{{ site.id }}</td>
                    <td><strong>{{ site.name }}</strong></td>
                    <td>{{ site.client_name }}</td>
                    <td>BD {{ "%.2f"|format(site.contract_amount) }}</td>
                    <td>
                        <div style="display:flex;gap:8px;flex-wrap:wrap;">
                            <a href="/edit_site/{{ site.id }}"
                               class="btn btn-warning btn-sm">
                                Edit
                            </a>
                            <a href="/delete_site/{{ site.id }}"
                               class="btn btn-danger btn-sm"
                               onclick="return confirm('Delete this site?')">
                                Delete
                            </a>
                        </div>
                    </td>
                </tr>

                {% endfor %}

            </tbody>

        </table>

    </div>

</div>

{% endblock %}
