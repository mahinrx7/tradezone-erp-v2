{% extends "base.html" %}

{% block content %}

<h1 class="mb-4">

Add Labour

</h1>

<div class="card p-4">

<form method="POST">

<div class="mb-3">

<label class="mb-2">

Name

</label>

<input type="text"
       name="name"
       class="form-control">

</div>

<div class="mb-3">

<label class="mb-2">

Specialization

</label>

<input type="text"
       name="specialization"
       class="form-control">

</div>

<div class="mb-4">

<label class="mb-2">

Hourly Rate

</label>

<input type="number"
       step="0.01"
       name="hourly_rate"
       class="form-control">

</div>

<button class="btn btn-primary">

Save Labour

</button>

</form>

</div>

{% endblock %}
