{% extends "base.html" %}

{% block content %}

<h1 class="mb-4">

Admin Panel

</h1>


<div class="card p-4 mb-4">

<h3 class="mb-4">

Add Supervisor

</h3>

<form method="POST"
      action="/add_supervisor">

<div class="row g-3">

<div class="col-lg-5">

<input type="text"
       name="username"
       placeholder="Username"
       class="form-control"
       required>

</div>


<div class="col-lg-5">

<input type="password"
       name="password"
       placeholder="Password"
       class="form-control"
       required>

</div>


<div class="col-lg-2">

<button class="btn btn-primary w-100">

Create

</button>

</div>

</div>

</form>

</div>



<div class="card p-4">

<h3 class="mb-4">

Users

</h3>

<div class="table-responsive">

<table class="table table-dark table-hover align-middle">

<thead>

<tr>

<th>ID</th>
<th>Username</th>
<th>Role</th>
<th>Delete</th>

</tr>

</thead>

<tbody>

{% for user in users %}

<tr>

<td>
{{ user.id }}
</td>

<td>
{{ user.username }}
</td>

<td>
{{ user.role }}
</td>

<td>

{% if user.id != current_user.id %}

<a href="/delete_user/{{ user.id }}"
   class="btn btn-danger btn-sm">

Delete

</a>

{% else %}

<span class="text-secondary">

Current User

</span>

{% endif %}

</td>

</tr>

{% endfor %}

</tbody>

</table>

</div>

</div>

{% endblock %}
