{% extends "base.html" %}

{% block content %}

<h1 class="mb-4">

Edit Expense

</h1>

<div class="card p-4">

<form method="POST">

<div class="mb-3">

<label class="mb-2">

Category

</label>

<input type="text"
       name="category"
       value="{{ expense.category }}"
       class="form-control">

</div>

<div class="mb-3">

<label class="mb-2">

Description

</label>

<input type="text"
       name="description"
       value="{{ expense.description }}"
       class="form-control">

</div>

<div class="mb-3">

<label class="mb-2">

Amount

</label>

<input type="number"
       step="0.01"
       name="amount"
       value="{{ expense.amount }}"
       class="form-control">

</div>

<div class="mb-4">

<label class="mb-2">

Date

</label>

<input type="date"
       name="date"
       value="{{ expense.date }}"
       class="form-control">

</div>

<button class="btn btn-primary">

Update Expense

</button>

</form>

</div>

{% endblock %}
