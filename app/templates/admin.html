{% extends "base.html" %}

{% block content %}

<div class="page-header">
    <h1 class="page-title">Admin Panel</h1>
</div>


<div class="card mb-4">

    <div class="card-body">

        <h3 style="font-size:16px;font-weight:600;margin-bottom:20px;color:var(--text-secondary);">
            Add Supervisor
        </h3>

        <form method="POST" action="/add_supervisor">

            <div class="row g-3 align-items-end">

                <div class="col-lg-5 col-md-6">
                    <label class="mb-2">Username</label>
                    <input type="text" name="username"
                           placeholder="Enter username"
                           class="form-control" required>
                </div>

                <div class="col-lg-5 col-md-6">
                    <label class="mb-2">Password</label>
                    <input type="password" name="password"
                           placeholder="Enter password"
                           class="form-control" required>
                </div>

                <div class="col-lg-2 col-md-12">
                    <button class="btn btn-primary w-100" style="height:48px;">
                        Create
                    </button>
                </div>

            </div>

        </form>

    </div>

</div>


<div class="card">

    <div class="card-body">

        <h3 style="font-size:16px;font-weight:600;margin-bottom:20px;color:var(--text-secondary);">
            Users
        </h3>

        <div class="table-responsive">

            <table class="table table-dark table-hover align-middle">

                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Username</th>
                        <th>Role</th>
                        <th>Action</th>
                    </tr>
                </thead>

                <tbody>

                    {% for user in users %}

                    <tr>
                        <td>{{ user.id }}</td>
                        <td><strong>{{ user.username }}</strong></td>
                        <td>
                            <span style="background:{% if user.role == 'admin' %}rgba(10,132,255,0.12);color:#0a84ff{% else %}rgba(255,159,10,0.12);color:#ff9f0a{% endif %};
                                         padding:4px 10px;border-radius:8px;font-size:12px;font-weight:600;">
                                {{ user.role }}
                            </span>
                        </td>
                        <td>
                            {% if user.id != current_user.id %}
                            <a href="/delete_user/{{ user.id }}"
                               class="btn btn-danger btn-sm"
                               onclick="return confirm('Delete this user?')">
                                Delete
                            </a>
                            {% else %}
                            <span style="color:var(--text-tertiary);font-size:13px;">
                                You
                            </span>
                            {% endif %}
                        </td>
                    </tr>

                    {% endfor %}

                </tbody>

            </table>

        </div>

    </div>

</div>

{% endblock %}
