{% extends "base.html" %}

{% block content %}

<h1 class="mb-4">
Analytics
</h1>


<div class="card p-4 mb-4">

<form method="GET"
      action="/analytics">

<div class="row g-3 align-items-end">


<div class="col-lg-3">

<select name="site_id"
        class="form-control">

<option value="">
All Sites
</option>

{% for site in sites %}

<option value="{{ site.id }}"
{% if request.args.get('site_id') == site.id|string %}
selected
{% endif %}
>

{{ site.name }}

</option>

{% endfor %}

</select>

</div>



<div class="col-lg-3">

<label class="mb-2">

From Date

</label>

<input type="date"
       name="start_date"
       class="form-control">

</div>



<div class="col-lg-3">

<label class="mb-2">

To Date

</label>

<input type="date"
       name="end_date"
       class="form-control">

</div>



<div class="col-lg-3">

<button class="btn btn-primary w-100">

Generate Report

</button>

</div>

</div>

</form>

</div>



<div class="card p-4 analytics-chart-card">

<img src="data:image/png;base64,{{ chart }}"
     class="analytics-chart">

</div>

{% endblock %}
