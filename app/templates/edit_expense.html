{% extends "base.html" %}

{% block content %}

<div class="page-header">

    <h1>Edit Expense</h1>

</div>

<div class="card">

    <form method="POST">

        <div class="form-grid">

            <select
                name="site_id"
                class="form-input"
                required
            >

                {% for site in sites %}

                <option
                    value="{{ site.id }}"
                    {% if site.id == expense.site_id %}
                    selected
                    {% endif %}
                >

                    {{ site.name }}

                </option>

                {% endfor %}

            </select>

            <input
                type="text"
                name="category"
                class="form-input"
                value="{{ expense.category }}"
                required
            >

            <input
                type="text"
                name="description"
                class="form-input"
                value="{{ expense.description }}"
                required
            >

            <input
                type="number"
                step="0.001"
                name="amount"
                class="form-input"
                value="{{ expense.amount }}"
                required
            >

            <input
                type="date"
                name="date"
                class="form-input"
                value="{{ expense.date if expense.date else '' }}"
                required
            >

        </div>

        <button
            type="submit"
            class="btn-primary"
        >

            Update Expense

        </button>

    </form>

</div>

{% endblock %}
