{% extends "base.html" %}

{% block content %}

<div class="page-header">
    <h1 class="page-title">Add Site</h1>
</div>

<div class="card">

    <div class="card-body">

    <form method="POST">

        <div class="mb-3">
            <label class="mb-2">Site Name</label>
            <input type="text" name="name" class="form-control" required>
        </div>

        <div class="mb-3">
            <label class="mb-2">Client Name</label>
            <input type="text" name="client_name" class="form-control" required>
        </div>

        <div class="mb-4">
            <label class="mb-2">Contract Amount (BD)</label>
            <input type="number" step="0.01" name="contract_amount"
                   class="form-control" required>
        </div>

        <button class="btn btn-primary" style="height:48px;padding:0 32px;">
            Save Site
        </button>

    </form>

    </div>

</div>

{% endblock %}
